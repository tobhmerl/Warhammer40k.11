<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#070b0a" />
    <!-- iOS: behave like a native app when added to the Home Screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TombWorld" />
    <meta name="format-detection" content="telephone=no" />
    <title>TombWorld — Warhammer 40k Army Forge</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="Warhammer40k.11.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <style>
        /* Dark base lives on <html> so the fixed background image (body::before) stays visible. */
        html { margin: 0; background-color: #070b0a; }
        body { margin: 0; }
    </style>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="boot">
            <p class="boot-brand">TombWorld</p>
            <svg class="loading-progress">
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
            <div class="loading-progress-text"></div>
            <p class="boot-sub">Awakening the tomb world&hellip;</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
    <script>
        // Minimal interop for the Settings tab (AB8): theme switch + JSON file download.
        window.tombworld = {
            setTheme: function (id) {
                document.documentElement.setAttribute('data-theme', id || 'phosphor');
            },
            download: function (filename, text) {
                const blob = new Blob([text], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            },
            // Reflects scroll direction on <html data-scroll="top|down|up"> so CSS can float/auto-hide the
            // Play HUD: shown at the top and while scrolling down, hidden while scrolling up. Idempotent.
            initScroll: function () {
                if (window.tombworld._scroll) return;
                window.tombworld._scroll = true;
                const root = document.documentElement;
                let lastY = window.scrollY || 0;
                let ticking = false;
                const apply = function () {
                    const y = window.scrollY || 0;
                    if (y <= 6) root.setAttribute('data-scroll', 'top');
                    else if (y > lastY + 4) root.setAttribute('data-scroll', 'down');
                    else if (y < lastY - 4) root.setAttribute('data-scroll', 'up');
                    lastY = y;
                    ticking = false;
                };
                root.setAttribute('data-scroll', 'top');
                window.addEventListener('scroll', function () {
                    if (!ticking) { window.requestAnimationFrame(apply); ticking = true; }
                }, { passive: true });
            },
            scrollTop: function () {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },
            scrollBottom: function () {
                window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
            },
            // Horizontal swipe deck for Play Mode: binds touch gestures on the deck element and calls back into
            // .NET to page one unit card at a time. Only a deliberate horizontal swipe pages (so taps on the
            // in-card steppers/toggles still work). Idempotent per element; detach() clears the previous binding.
            deck: {
                _el: null,
                _onStart: null,
                _onEnd: null,
                attach: function (el, dotNetRef) {
                    if (!el) return;
                    this.detach();
                    let sx = 0, sy = 0, st = 0;
                    const onStart = function (e) {
                        const t = e.changedTouches ? e.changedTouches[0] : e;
                        sx = t.clientX; sy = t.clientY; st = Date.now();
                    };
                    const onEnd = function (e) {
                        const t = e.changedTouches ? e.changedTouches[0] : e;
                        const dx = t.clientX - sx;
                        const dy = t.clientY - sy;
                        const dt = Date.now() - st;
                        // Deliberate, mostly-horizontal flick: far enough, more across than down, not too slow.
                        if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.6 && dt < 700) {
                            dotNetRef.invokeMethodAsync(dx < 0 ? 'SwipeNext' : 'SwipePrev');
                        }
                    };
                    el.addEventListener('touchstart', onStart, { passive: true });
                    el.addEventListener('touchend', onEnd, { passive: true });
                    this._el = el; this._onStart = onStart; this._onEnd = onEnd;
                },
                detach: function () {
                    if (this._el) {
                        this._el.removeEventListener('touchstart', this._onStart);
                        this._el.removeEventListener('touchend', this._onEnd);
                    }
                    this._el = null; this._onStart = null; this._onEnd = null;
                }
            },

            // Drag-to-reorder the Play-Mode deck pills. Press a pill and slide it sideways to pick it up (no
            // long-press needed); it follows the finger with a drop caret marking the target slot, and on release
            // it reports the move (from -> to) to .NET. A vertical swipe still scrolls the page; a tap still
            // navigates. State machine: 'idle' -> 'pending' (pressed) -> 'dragging' (slid far enough sideways).
            reorder: {
                _el: null, _ref: null, _caret: null,
                _onDown: null, _onMove: null, _onUp: null, _onCancel: null, _onClick: null,
                _state: 'idle', _suppressClick: false, _pill: null, _pointerId: -1,
                _startIndex: -1, _to: -1, _startX: 0, _startY: 0, _threshold: 6,
                attach: function (el, dotNetRef) {
                    if (!el) return;
                    this.detach();
                    const self = this;
                    this._el = el;
                    this._ref = dotNetRef;
                    const begin = function () {
                        self._state = 'dragging';
                        self._to = self._startIndex;
                        self._pill.classList.add('dragging');
                        el.classList.add('reordering');
                        const caret = document.createElement('div');
                        caret.className = 'deck-drop-caret';
                        el.appendChild(caret);
                        self._caret = caret;
                        if (navigator.vibrate) { try { navigator.vibrate(12); } catch (_) { } }
                    };
                    const onDown = function (e) {
                        if (!e.isPrimary) return;
                        if (e.pointerType === 'mouse' && e.button !== 0) return;
                        const pill = e.target.closest ? e.target.closest('.deck-dot') : null;
                        if (!pill || !el.contains(pill)) return;
                        self._pill = pill;
                        self._pointerId = e.pointerId;
                        self._startIndex = parseInt(pill.dataset.reorderIndex, 10);
                        self._startX = e.clientX;
                        self._startY = e.clientY;
                        self._state = 'pending';
                    };
                    const onMove = function (e) {
                        if (self._state === 'idle' || e.pointerId !== self._pointerId) return;
                        const dx = e.clientX - self._startX;
                        const dy = e.clientY - self._startY;
                        if (self._state === 'pending') {
                            const adx = Math.abs(dx), ady = Math.abs(dy);
                            if (adx < self._threshold && ady < self._threshold) return;
                            if (adx >= ady) {
                                // Sideways intent: take over the gesture and pick the pill up.
                                try { self._pill.setPointerCapture(self._pointerId); } catch (_) { }
                                begin();
                            } else {
                                // Mostly-vertical: leave it to the browser to scroll the page.
                                self._state = 'idle';
                                return;
                            }
                        }
                        e.preventDefault();
                        self._pill.style.transform = 'translateX(' + dx + 'px)';
                        self.updateTarget(e.clientX, e.clientY);
                    };
                    const finish = function (commit) {
                        if (self._state === 'dragging') {
                            const from = self._startIndex, to = self._to;
                            self.cleanupDrag();
                            if (commit && to !== from && to >= 0 && self._ref) {
                                self._suppressClick = true;
                                self._ref.invokeMethodAsync('ReorderUnit', from, to);
                            }
                        }
                        self._state = 'idle';
                        self._pill = null;
                        self._pointerId = -1;
                        self._startIndex = -1;
                    };
                    const onUp = function (e) { if (e.pointerId === self._pointerId) finish(true); };
                    const onCancel = function (e) { if (e.pointerId === self._pointerId) finish(false); };
                    const onClick = function (e) {
                        if (self._suppressClick) {
                            self._suppressClick = false;
                            e.preventDefault();
                            e.stopPropagation();
                        }
                    };
                    el.addEventListener('pointerdown', onDown);
                    el.addEventListener('pointermove', onMove, { passive: false });
                    el.addEventListener('pointerup', onUp);
                    el.addEventListener('pointercancel', onCancel);
                    el.addEventListener('click', onClick, true);
                    this._onDown = onDown; this._onMove = onMove; this._onUp = onUp;
                    this._onCancel = onCancel; this._onClick = onClick;
                },
                // Picks the insertion slot nearest the finger among the OTHER pills (the dragged one is excluded so
                // it doesn't always read as "nearest"), and moves the caret to that gap. Works across wrapped rows.
                updateTarget: function (px, py) {
                    const el = this._el;
                    if (!el || !this._pill) return;
                    const pills = Array.prototype.slice.call(el.querySelectorAll('.deck-dot'));
                    let nearest = null, best = Infinity;
                    for (let i = 0; i < pills.length; i++) {
                        const idx = parseInt(pills[i].dataset.reorderIndex, 10);
                        if (idx === this._startIndex) continue; // skip the pill being dragged
                        const r = pills[i].getBoundingClientRect();
                        const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
                        const d = (px - cx) * (px - cx) + (py - cy) * (py - cy);
                        if (d < best) { best = d; nearest = { r: r, idx: idx, cx: cx }; }
                    }
                    if (!nearest) { this._to = this._startIndex; return; }
                    const insertIdx = px < nearest.cx ? nearest.idx : nearest.idx + 1;
                    let to = insertIdx > this._startIndex ? insertIdx - 1 : insertIdx;
                    to = Math.max(0, Math.min(to, pills.length - 1));
                    this._to = to;
                    if (this._caret) {
                        const cr = el.getBoundingClientRect();
                        const left = (px < nearest.cx ? nearest.r.left : nearest.r.right) - cr.left;
                        this._caret.style.transform = 'translate(' + left + 'px,' + (nearest.r.top - cr.top) + 'px)';
                        this._caret.style.height = nearest.r.height + 'px';
                    }
                },
                cleanupDrag: function () {
                    if (this._pill) { this._pill.classList.remove('dragging'); this._pill.style.transform = ''; }
                    if (this._el) this._el.classList.remove('reordering');
                    if (this._caret) { this._caret.remove(); this._caret = null; }
                },
                detach: function () {
                    const el = this._el;
                    if (el) {
                        el.removeEventListener('pointerdown', this._onDown);
                        el.removeEventListener('pointermove', this._onMove);
                        el.removeEventListener('pointerup', this._onUp);
                        el.removeEventListener('pointercancel', this._onCancel);
                        el.removeEventListener('click', this._onClick, true);
                    }
                    this.cleanupDrag();
                    this._el = null; this._ref = null; this._pill = null;
                    this._state = 'idle'; this._pointerId = -1; this._startIndex = -1;
                    this._onDown = this._onMove = this._onUp = this._onCancel = this._onClick = null;
                }
            },

            // Auto-save safety net: persist pending roster edits when the tab is hidden or the page is being
            // unloaded (mobile browsers fire 'pagehide'/'visibilitychange' rather than a reliable 'beforeunload').
            _flushRef: null,
            _onHide: null,
            flushOnHide: function (dotNetRef) {
                this.cancelFlushOnHide();
                this._flushRef = dotNetRef;
                const self = this;
                this._onHide = function () {
                    if (document.visibilityState === 'hidden' && self._flushRef) {
                        self._flushRef.invokeMethodAsync('FlushSave');
                    }
                };
                document.addEventListener('visibilitychange', this._onHide);
                window.addEventListener('pagehide', this._onHide);
            },
            cancelFlushOnHide: function () {
                if (this._onHide) {
                    document.removeEventListener('visibilitychange', this._onHide);
                    window.removeEventListener('pagehide', this._onHide);
                }
                this._onHide = null;
                this._flushRef = null;
            }
        };
    </script>
</body>

</html>
